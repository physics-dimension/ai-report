<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Report</title>
  <meta name="description" content="AI Report：AI 工作流与模型测试的静态 HTML 报告索引。" />
  <style>
    :root { --bg:#fafafa; --paper:#fff; --ink:#111; --muted:#666; --line:#e5e5e5; --accent:#2563eb; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--ink); font:16px/1.65 -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif; }
    a { color:var(--accent); text-decoration:none; } a:hover { text-decoration:underline; }
    .page { max-width:980px; margin:0 auto; padding:48px 20px 72px; }
    header { margin-bottom:42px; }
    .label { font-size:13px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; font-weight:700; }
    h1 { font-size:clamp(38px,6vw,64px); line-height:1.02; letter-spacing:-.055em; margin:10px 0 16px; }
    .lead { font-size:20px; color:#333; max-width:760px; }
    .card { display:grid; grid-template-columns: 190px 1fr; gap:22px; align-items:start; background:var(--paper); border:1px solid var(--line); border-radius:16px; padding:18px; margin:18px 0; }
    .card img { width:100%; border-radius:10px; border:1px solid var(--line); background:#fff; }
    .card h2 { margin:0 0 8px; font-size:24px; letter-spacing:-.025em; }
    .meta { display:flex; flex-wrap:wrap; gap:8px; margin:12px 0; }
    .pill { font-size:13px; color:#444; border:1px solid var(--line); border-radius:999px; padding:3px 9px; background:#f7f7f7; }
    footer { margin-top:56px; color:var(--muted); font-size:14px; border-top:1px solid var(--line); padding-top:20px; }
    @media (max-width:720px){ .card{grid-template-columns:1fr;} .lead{font-size:18px;} }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <div class="label">AI Report</div>
      <h1>AI 生成报告的 HTML 阅读界面</h1>
      <p class="lead">Markdown 适合作为源文件；当内容包含图片、对比、结论和可视化结构时，HTML 更适合作为最终阅读界面。</p>
    </header>

    <section>
      <div class="label">Reports</div>
      <a class="card" href="./gpt-image-2-workflows/">
        <img src="./gpt-image-2-workflows/assets/product-ad-optimized.png" alt="GPT Image 2 Workflows 报告缩略图" />
        <div>
          <h2>GPT Image 2 Workflows Skill 测试报告</h2>
          <p>对比原始短描述与结构化 workflow prompt 的生成结果，重点分析可控性、乱码风险、商业素材可复用性。</p>
          <div class="meta"><span class="pill">4 个案例</span><span class="pill">Raw vs Optimized</span><span class="pill">HTML 报告</span></div>
          <strong>打开报告 →</strong>
        </div>
      </a>
    </section>

    <footer>AI Report · GitHub Pages 静态站点</footer>
  </main>
</body>
</html>
